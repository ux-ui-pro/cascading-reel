<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CascadingReel • Dev</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 14px;
        background: #121212;
      }

      #reelWrap {
        width: min(100% - 30px, 520px);
        aspect-ratio: 1 / 1;
        background-image: linear-gradient(103.58deg, #B6D0F7 0.9%, #EEF4E1 21.12%, #E2C1F9 39.05%, #BFD1F9 52.2%, #FAFCFE 62.83%, #BAE4E2 71.67%, #8C6BE3 89.14%);
      }

      canvas {
        width: 100%;
        height: 100%;
        display: block;
      }

      button {
        appearance: none;
        border: 0;
        padding: 10px 14px;
        background: #fafafa;
        color: #121212;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <button
      id="spinBtn"
      type="button"
    >
      Spin
    </button>
    <div id="reelWrap">
      <canvas id="canvas"></canvas>
    </div>

    <script type="module">
      import { CascadingReel } from './src/index.ts';

      const container = document.getElementById('reelWrap');
      const canvas = document.getElementById('canvas');
      const button = document.getElementById('spinBtn');

      if (!container || !canvas || !button) {
        throw new Error('Demo DOM is not ready');
      }

      const reel = new CascadingReel({
        canvas,
        container,
        button,
        sprite: new URL('./demo/assets/reel.svg', import.meta.url).href,
        spriteElementsCount: 6,
        highlightInitialWinningCells: true,
        particleColor: 'rainbow',
        initialSegments: [
          [0, 1, 2],
          [3, 0, 5],
          [0, 1, 0],
        ],
        queuedSpinStates: [
          {
            stopRows: [
              [0, 4, 5],
              [2, 1, 4],
              [1, 3, 0],
            ],
            finaleSequenceRows: [
              [
                [1, 1, 0],
                [0, 1, 2],
                [4, 5, 1],
              ],
            ],
            highlightWin: true,
            callback: () => {
              console.log('[CascadingReel] spin complete 1');
            },
          },
          {
            stopRows: [
              [1, 3, 0],
              [0, 4, 5],
              [2, 1, 4],
            ],
            finaleSequenceRows: [
              [
                [0, 1, 2],
                [4, 4, 4],
                [5, 4, 0],
              ],
            ],
            highlightWin: true,
            callback: () => {
              console.log('[CascadingReel] spin complete 2');
            },
          },
        ],
      });

      await reel.init();
    </script>
  </body>
</html>
